qlib_init:
    provider_uri: "~/.qlib/qlib_data/cn_data" # 二进制数据存储的根路径
    region: cn                                # 市场区域（cn 代表中国 A 股）

market: &market main_stock_2026_4_27   # 股票池
benchmark: &benchmark SH000905 # 回测基准指数（SH000905 为中证500指数）

data_handler_config: &data_handler_config
    start_time: 2017-01-01  # 从二进制数据库中加载特征数据的起点时间
    end_time: 2026-05-22    # 截止时间
    instruments: *market    # 股票池（用 *market 引用锚点）
    data_loader:
        class: qlib.contrib.data.loader.QlibDataLoader
        kwargs:
            config:
                feature: ["($close-$open)/$open", "$volume/Mean($volume, 20)", "($high-$low)/Ref($close, 1)", "$close/Ref($close, 1)-1"] # "$high", "$low", "$close", "$volume"
                label: 
                    - ["Ref($close, -2)/Ref($close, -1) - 1"]
                    - ["LABEL0"]

    learn_processors: # 训练阶段的数据预处理流水线
        - class: Fillna
          kwargs:
              fields_group: feature # 对特征组进行空值填充，防止模型因缺失值报错
        - class: DropnaLabel       # 丢弃Label（预测收益率）为空的样本行
        - class: CSZScoreNorm
          kwargs:
              fields_group: feature # 对同一天所有股票的特征进行截面标准化，消除量纲
        - class: CSZScoreNorm
          kwargs:
              fields_group: label   # 对标签也进行截面标准化
    infer_processors: # 推理阶段的数据预处理流水线
        - class: Fillna
          kwargs:
              fields_group: feature # 特征空值填充
        - class: CSZScoreNorm
          kwargs:
              fields_group: feature # 特征截面标准化
        - class: CSZScoreNorm
          kwargs:
              fields_group: label   # 标签截面标准化

port_analysis_config: &port_analysis_config
    executor:
        class: SimulatorExecutor
        module_path: qlib.backtest.executor
        kwargs:
            time_per_step: day
            generate_portfolio_metrics: True
            verbose: False
            indicator_config:
                show_indicator: True
    strategy:
        class: TopkDropoutStrategy
        module_path: qlib.contrib.strategy
        kwargs:
            signal: <PRED> # 使用模型预测评分作为选股信号
            topk: 15       # 每日持仓股票数量
            n_drop: 5      # 如果持仓股排名落后超过则卖出调仓
            hold_thresh: 1 # 最小持仓天数
            risk_degree: 0.90 #最多用90%的资金
    backtest:
        start_time: 2024-01-01 # 模拟回测的开始时间（对齐测试集起点）
        end_time: 2026-05-22   # 模拟回测的结束时间
        account: 50000        # 初始模拟账户资金
        benchmark: *benchmark  # 基准
        exchange_kwargs:
            limit_threshold: 0.095 # 涨跌停限制（0.095 避开了 A 股 10% 无法成交的封板状态）
            deal_price: ["$open", "$close"]  # 买入用开盘价，卖出用收盘价（list 形式必须带 $ 前缀）
            open_cost: 0.0002      # 买入费率（万2）
            close_cost: 0.0008     # 卖出费率（万8）
            min_cost: 5            # 每笔最低交易手续费（5 元）


task:
    model:
        class: LGBModel # 采用 LightGBM 模型（GBDT 决策树）
        module_path: qlib.contrib.model.gbdt
        kwargs:
            loss: mse                 # 损失函数：均方误差（Mean Squared Error）
            colsample_bytree: 0.8879  # 特征采样率。每棵树随机使用 88.79% 的特征
            learning_rate: 0.1        # 学习率/步长
            subsample: 0.8789         # 样本采样率。每棵树随机使用 87.89% 的股票样本
            lambda_l1: 205.6999       # L1 正则化系数
            lambda_l2: 580.9768       # L2 正则化系数
            max_depth: 4              # 树的最大深度，防止模型过度拟合（过拟合）
            num_leaves: 210           # 叶子节点最大数量
            num_threads: 20           # 训练模型时所调用的 CPU 核心线程数
    dataset:
        class: DatasetH # 数据集包装层
        module_path: qlib.data.dataset
        kwargs:
            handler:
                class: DataHandlerLP # 底层数据处理器
                module_path: qlib.contrib.data.handler
                kwargs: *data_handler_config
            segments: # 数据集切分区间
                train: [2017-01-01, 2022-12-31] # 训练集时间跨度
                valid: [2023-01-01, 2023-12-31] # 验证集时间跨度
                test: [2024-01-01, 2026-05-22]  # 测试集时间跨度
    record: # 实验评估与记录器
        - class: SignalRecord # 保存模型生成的预测评分（PRED 信号）
          module_path: qlib.workflow.record_temp
          kwargs: 
            model: <MODEL>
            dataset: <DATASET>
        - class: SigAnaRecord # 信号分析记录器（计算 IC、Rank IC 等指标）
          module_path: qlib.workflow.record_temp
          kwargs: 
            ana_long_short: False # 是否进行多空头分析
            ann_scaler: 252       # 年化换算常数（一年约 252 个交易日）
        - class: PortAnaRecord # 投资组合回测分析记录器
          module_path: qlib.workflow.record_temp
          kwargs: 
            config: *port_analysis_config
