# AlphaPilot — single image, three services (portal / scheduler / notify).
#
# Quick start:
#   cp .env.docker.example .env      # fill in OPENAI_API_KEY etc.
#   docker compose build
#   docker compose up -d portal scheduler
#   # optional bot command receiver (needs a configured channel):
#   docker compose --profile notify up -d notify
#
# Persistent state lives in ./docker-data/ (bind mounts) — create the dirs first:
#   mkdir -p docker-data/{qlib-data,app-config,workspace,pickle-cache,logs}
# Market data (~2.4 GB) is downloaded at runtime into ./docker-data/qlib-data on
# the first data job — it is NOT baked into the image. To reuse data you already
# have on the host: cp -R ~/.qlib/ docker-data/qlib-data/

# Shared build/config; each service only differs by its command (+ portal extras).
x-app: &app
  # Microsoft qlib (`pyqlib`) ships wheels for linux/amd64 only — no linux/arm64.
  # Pin amd64 so the image builds & runs identically on Apple Silicon (Docker
  # Desktop emulates it; enable Rosetta in Settings → General for best speed) and
  # on amd64 servers.
  platform: linux/amd64
  build:
    context: .
    dockerfile: Dockerfile
    args:
      # Debian apt mirror (see Dockerfile). Set APT_MIRROR=mirrors.aliyun.com in
      # .env on networks where deb.debian.org is blocked/slow (e.g. behind a proxy).
      APT_MIRROR: ${APT_MIRROR:-deb.debian.org}
  image: alphapilot:latest
  env_file:
    - .env
  working_dir: /app
  restart: unless-stopped
  # All persistent state is bind-mounted to ./docker-data/ on the host so every
  # artifact (runs, caches, logs, market data, config) is a plain file you can
  # browse — not hidden inside a Docker-managed volume.
  volumes:
    - ./docker-data/qlib-data:/root/.qlib              # 行情数据 (baostock/tushare → qlib bin, ~2.4 GB)
    - ./docker-data/app-config:/root/.alphapilot       # portal settings/env.json, runtime, notify creds & state
    - ./docker-data/workspace:/app/git_ignore_folder   # 挖掘&回测 runs/, factor_h5_cache/, portal_jobs/, portal_schedules/
    - ./docker-data/pickle-cache:/app/pickle_cache     # mine/backtest 结果复用缓存
    - ./docker-data/logs:/app/log                      # 应用 + LLM 消息日志

services:
  portal:
    <<: *app
    command: ["alphapilot", "portal", "--host", "0.0.0.0", "--port", "19901"]
    environment:
      # Default host is 127.0.0.1 (unreachable from outside the container).
      ALPHAPILOT_PORTAL_HOST: "0.0.0.0"
      ALPHAPILOT_PORTAL_PORT: "19901"
    ports:
      - "19901:19901"
    # torch + multiprocessing(spawn) + large datasets need more than the 64 MB default.
    shm_size: "2gb"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19901/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

  # Fires saved data/mine/backtest schedules.
  scheduler:
    <<: *app
    command: ["alphapilot", "scheduler"]
    shm_size: "2gb"
    depends_on:
      - portal

  # Telegram/Feishu inbound command receiver. Disabled by default; enable with
  # `--profile notify`. Needs a configured channel (see .env.docker.example).
  notify:
    <<: *app
    command: ["alphapilot", "notify_commands", "--channel", "telegram"]
    depends_on:
      - portal
    profiles:
      - notify

  # Live-trading executor (vn.py + compiled XTP/EMT gateways). Separate image
  # (Dockerfile.live) and disabled by default; enable with `--profile live`.
  # Broker credentials go in .env as ALPHAPILOT_LIVE_<BROKER>_* variables —
  # never baked into the image. Default command is the import smoke; run the
  # gated real-connect check with:
  #   docker compose --profile live run --rm live python scripts/live_smoke_connect_xtp.py
  live:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile.live
      args:
        APT_MIRROR: ${APT_MIRROR:-deb.debian.org}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
    image: alphapilot-live:latest
    env_file:
      - .env
    working_dir: /app
    volumes:
      - ./docker-data/live:/app/git_ignore_folder      # live ledger / state
      - ./docker-data/logs:/app/log
    profiles:
      - live
